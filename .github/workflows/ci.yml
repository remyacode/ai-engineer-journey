name: CI

on:
  push:
    branches: [main, "phase*"]
  pull_request:
    branches: [main]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify Python installed correctly
        run: python --version

      - name: Install flake8 (style checker)
        run: pip install flake8

      - name: Run flake8 on any Python files
        run: flake8 . --count --show-source --statistics || true
